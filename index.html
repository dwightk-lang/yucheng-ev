<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玉成國小地下停車場 充電樁狀態</title><style>
:root{--bg:#0f1115;--card:#1b1f27;--txt:#e8eaed;--sub:#9aa0aa;--good:#2ecc71;--bad:#e74c3c;--accent:#4da3ff;--line:#2a2f3a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;display:flex;justify-content:center;padding:24px 14px;min-height:100vh}
.card{width:100%;max-width:460px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 10px 40px rgba(0,0,0,.4)}
h1{font-size:1.18rem;margin:0 0 2px}.addr{color:var(--sub);font-size:.82rem;margin:0 0 18px}
.big{display:flex;align-items:baseline;gap:8px;margin:6px 0 4px}.big .num{font-size:3.4rem;font-weight:700;line-height:1;color:var(--good)}.big .num.zero{color:var(--bad)}.big .of{font-size:1rem;color:var(--sub)}
.label{color:var(--sub);font-size:.82rem;margin-bottom:16px}
.dots{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 18px}.dot{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:600;color:#fff}.dot.good{background:var(--good)}.dot.bad{background:var(--bad)}
.meta{border-top:1px solid var(--line);padding-top:14px;font-size:.84rem}.meta div{display:flex;justify-content:space-between;padding:5px 0;gap:12px}.meta .k{color:var(--sub)}.meta .v{text-align:right}.meta a{color:var(--accent);text-decoration:none}
.bar{display:flex;gap:10px;margin-top:16px}button{flex:1;border:0;border-radius:10px;padding:11px;font-size:.9rem;font-weight:600;cursor:pointer;background:var(--accent);color:#fff}button:disabled{opacity:.5}
.ts{text-align:center;color:var(--sub);font-size:.74rem;margin-top:12px;line-height:1.5;white-space:pre-line}.err{color:var(--bad);font-size:.82rem;text-align:center;margin-top:10px;display:none}
</style></head><body><div class="card">
<h1>玉成國小地下停車場</h1>
<p class="addr">台北市南港區昆陽街 23 號 B1–B2　·　充電樁 6 座　·　汽車位 293 格</p>
<div class="big"><span class="num" id="avail">–</span><span class="of">可用 / 共 <b id="total">6</b> 座</span></div>
<div class="label" id="statusLabel">載入中…</div>
<div class="dots" id="dots"></div>
<div class="meta">
<div><span class="k">汽車位</span><span class="v" id="carSpots">–</span></div>
<div><span class="k">機車位</span><span class="v" id="motorSpots">–</span></div>
<div><span class="k">身障車位</span><span class="v" id="hcSpots">–</span></div>
<div><span class="k">孕婦親子</span><span class="v" id="pgSpots">–</span></div>
<div><span class="k">大型重機</span><span class="v" id="hmSpots">–</span></div>
<div><span class="k">停車費率</span><span class="v" id="parkFee">30元/時(08–18)、20元/時(18–08)，半小時計</span></div>
<div><span class="k">月租</span><span class="v">全日2,500・日間2,000（機車300）</span></div>
<div><span class="k">充電費率</span><span class="v" id="chgFee">計時/每日/5元每0.5時</span></div>
<div><span class="k">營業時間</span><span class="v">24 小時</span></div>
<div><span class="k">電話</span><span class="v"><a href="tel:0226550818">02-2655-0818</a></span></div>
<div><span class="k">地圖</span><span class="v"><a href="https://www.google.com/maps?q=25.05329,121.59294" target="_blank">Google 地圖 ↗</a></span></div>
</div>
<div class="meta" style="margin-top:12px">
<div><span class="k" style="color:var(--txt);font-weight:600">附近停車場</span><span class="v" style="color:var(--sub)">汽車位剩餘</span></div>
<div><span class="k">新新公園平面</span><span class="v" id="lot-TPE1259">–</span></div>
<div><span class="k">Times 昆陽街</span><span class="v" id="lot-TPE1810">–</span></div>
</div>
<div class="bar"><button id="refresh" onclick="load()">重新整理</button></div>
<div class="ts" id="ts"></div><div class="err" id="err"></div>
</div><script>
const WORKER='https://yucheng-ev.borch1004.workers.dev/api/status';
const TCMSV='https://tcgbusfs.blob.core.windows.net/blobtcmsv/TCMSV_allavailable.json';
const CAR_ID='TPE0722';
let carTotal=293,motorTotal=28; // TCMSV alldesc 靜態值,status.json 有值時覆寫
const HC_TOTAL=8,PG_TOTAL=5,HM_TOTAL=6; // 身障/孕婦親子/大型重機 總數(alldesc summary)
// 附近停車場 (TCMSV id: 汽車位總數)
// 南港高中TPE0596(月租/季票制無閘門)、國建TPE1780 無即時feed,已移除
const NEARBY={TPE1259:10,TPE1810:247};
let carLive=false; // TCMSV 直連成功後,不再讓 status.json 備援值覆寫
function setSpots(id,avail,total){
 if(avail==null&&total==null)return;
 const t=(total==null?'–':total);
 document.getElementById(id).innerHTML=(avail==null||avail<0)
  ?'<span style="color:var(--sub)">無資料</span> / 共 '+t
  :'<b style="color:var(--'+(avail===0?'bad':'good')+')">剩 '+avail+'</b> / 共 '+t;
}
async function loadCar(){
 try{
  const r=await fetch(TCMSV,{cache:'no-store'});
  if(!r.ok)throw new Error();
  const j=await r.json();
  const parks=(j.data&&j.data.park)||[];
  const p=parks.find(x=>x.id===CAR_ID);
  if(!p)throw new Error();
  Object.keys(NEARBY).forEach(id=>{
   const q=parks.find(x=>x.id===id);
   setSpots('lot-'+id,q?q.availablecar:null,NEARBY[id]);
  });
  setSpots('carSpots',p.availablecar,carTotal);
  setSpots('motorSpots',p.availablemotor,motorTotal);
  setSpots('hcSpots',p.availablehandicap,HC_TOTAL);
  setSpots('pgSpots',p.availablepregnancy,PG_TOTAL);
  setSpots('hmSpots',p.availableheavymotor,HM_TOTAL);
  carLive=true;
 }catch(_){carLive=false;/* 直連失敗時保留 status.json 備援值 */}
}
async function fetchWorker(){
 const c=new AbortController(),t=setTimeout(()=>c.abort(),4000);
 try{
  const r=await fetch(WORKER,{cache:'no-store',signal:c.signal});
  if(!r.ok)throw new Error('worker http '+r.status);
  const d=await r.json();if(d.error)throw new Error(d.error);
  d._rt=true;return d;
 }finally{clearTimeout(t);}
}
async function load(quiet){
 const b=document.getElementById('refresh'),e=document.getElementById('err');
 if(!quiet){b.disabled=true;e.style.display='none';b.textContent='載入中…';}
 try{
  let d;
  try{d=await fetchWorker();}
  catch(_){d=await (await fetch('status.json?t='+Date.now(),{cache:'no-store'})).json();}
  document.getElementById('avail').textContent=d.live?d.good:'–';
  document.getElementById('avail').className='num'+(d.live&&d.good===0?' zero':'');
  document.getElementById('total').textContent=d.total||6;
  document.getElementById('statusLabel').textContent=
    !d.live?'此刻來源無即時資料':(d.good>0?('目前有 '+d.good+' 座可充電（來源：'+d.source+'）'):'目前全部使用中');
  // 停車費率固定用停管處官方 payex(opendata 的「每0.5小時10元」與官方不符,不再套用)
  if(d.chgFee)document.getElementById('chgFee').textContent=d.chgFee;
  if(d.carTotal!=null)carTotal=d.carTotal;
  if(d.motorTotal!=null)motorTotal=d.motorTotal;
  if(!carLive&&d.carAvail!==undefined){
   setSpots('carSpots',d.carAvail,carTotal);
   setSpots('motorSpots',d.motorAvail,motorTotal);
   setSpots('hcSpots',d.hcAvail,HC_TOTAL);
   setSpots('pgSpots',d.pgAvail,PG_TOTAL);
   setSpots('hmSpots',d.hmAvail,HM_TOTAL);
   if(d.nearby)Object.keys(NEARBY).forEach(id=>setSpots('lot-'+id,d.nearby[id],NEARBY[id]));
  }
  const box=document.getElementById('dots');box.innerHTML='';
  if(d.live){for(let i=0;i<d.good;i++)box.insertAdjacentHTML('beforeend','<div class="dot good">空</div>');
   for(let i=0;i<d.bad;i++)box.insertAdjacentHTML('beforeend','<div class="dot bad">用</div>');}
  document.getElementById('ts').textContent=d._rt
    ?('即時查詢：'+new Date().toLocaleString('zh-TW',{hour12:false})
      +'\n（頁面每 10 秒重新整理，資料源即時）'
      +(d.source&&d.source.indexOf('停車場')<0?'\n⚠ 即時來源為充電站feed，可能略有滯後':''))
    :('資料時間：'+d.updated
      +(d.stale_feed?'\n⚠ 主要資料源暫無回應，此為備援充電站資料（可能滯後數小時）':'\n（公司網路備援模式：資料源每 5 分鐘更新）'));
 }catch(err){if(!quiet){e.style.display='block';e.textContent='讀取失敗：'+err.message;}}
 finally{if(!quiet){b.disabled=false;b.textContent='重新整理';}}
}
load();loadCar();
setInterval(()=>load(true),10000);
setInterval(loadCar,60000); // TCMSV 官方 feed 約每分鐘更新一次
</script></body></html>

name: update-status
on:
  schedule:
    - cron: '*/5 * * * *'   # 每 5 分鐘（GitHub cron 最短間隔）
  workflow_dispatch:          # 也可在 Actions 頁手動執行
permissions:
  contents: write
concurrency:
  group: update-status
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 抓取並解析停管處 TCMSV (= itaipeiparking 同源)
        run: |
          python3 - <<'PY'
          import urllib.request, ssl, json, datetime
          # 充電樁 + 車位皆來自台北市停管處 TCMSV 官方 feed(玉成國小 = TPE0722)
          # 這與 itaipeiparking.pma.gov.taipei 為同一後端;充電樁狀態在 ChargeStation.scoketStatusList
          CAR_ID = "TPE0722"
          NEARBY_IDS = ["TPE1259", "TPE1810"]  # 新新公園/Times昆陽街
          ctx = ssl.create_default_context(); ctx.check_hostname=False; ctx.verify_mode=ssl.CERT_NONE
          def get_json(url):
              req = urllib.request.Request(url, headers={"User-Agent":"Mozilla/5.0"})
              return json.loads(urllib.request.urlopen(req, timeout=40, context=ctx).read().decode("utf-8","ignore"))
          avail = get_json("https://tcgbusfs.blob.core.windows.net/blobtcmsv/TCMSV_allavailable.json")
          by_id = {x.get("id"): x for x in avail["data"]["park"]}
          p = by_id.get(CAR_ID)
          if not p: raise SystemExit("TCMSV 無 " + CAR_ID)
          # 充電樁:待機中=可用、其餘(充電中/離線/故障)=不可用
          lst = ((p.get("ChargeStation") or {}).get("scoketStatusList")) or []
          good = sum(1 for s in lst if s.get("spot_status") == "待機中")
          total = len(lst); bad = total - good
          # 車位總數(靜態,alldesc)
          carTotal = motorTotal = None
          try:
              desc = get_json("https://tcgbusfs.blob.core.windows.net/blobtcmsv/TCMSV_alldesc.json")
              d0 = next((x for x in desc["data"]["park"] if x.get("id")==CAR_ID), None)
              if d0: carTotal, motorTotal = d0.get("totalcar"), d0.get("totalmotor")
          except Exception as e:
              print("alldesc fetch failed (總數維持 null):", e)
          nearby = {i: (by_id[i].get("availablecar") if i in by_id else None) for i in NEARBY_IDS}
          tz = datetime.timezone(datetime.timedelta(hours=8))
          data = {
            "good":good, "bad":bad, "total":total or 6,
            "live":total>0, "source":"itaipeiparking/TCMSV", "stale_feed":False,
            "carTotal":carTotal, "carAvail":p.get("availablecar"),
            "motorTotal":motorTotal, "motorAvail":p.get("availablemotor"),
            "hcAvail":p.get("availablehandicap"),
            "pgAvail":p.get("availablepregnancy"),
            "hmAvail":p.get("availableheavymotor"),
            "nearby":nearby,
            "updated":datetime.datetime.now(tz).strftime("%Y-%m-%d %H:%M:%S"),
          }
          open("status.json","w",encoding="utf-8").write(json.dumps(data,ensure_ascii=False))
          print(data)
          PY
      - name: 提交更新
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || (git commit -m "update status" && git push)

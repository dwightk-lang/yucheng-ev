name: update-status
on:
  schedule:
    - cron: '*/5 * * * *'   # 每 5 分鐘（GitHub cron 最短間隔）
  workflow_dispatch:          # 也可在 Actions 頁手動執行
permissions:
  contents: write
concurrency:
  group: update-status
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 抓取並解析 opendata.vip
        run: |
          python3 - <<'PY'
          import urllib.request, ssl, re, json, datetime, time
          SRC = "https://www.opendata.vip/tdx/evParking/Taipei"
          PRIMARY, BACKUP = "玉成國小地下停車場", "玉成國小站"
          ctx = ssl.create_default_context(); ctx.check_hostname=False; ctx.verify_mode=ssl.CERT_NONE
          def fetch():
              req = urllib.request.Request(SRC, headers={"User-Agent":"Mozilla/5.0"})
              return urllib.request.urlopen(req, timeout=40, context=ctx).read().decode("utf-8","ignore")
          def row_for(html, name):
              for m in re.finditer(re.escape(name), html):
                  if "<td" in html[max(0,m.start()-20):m.start()]:
                      return html[html.rfind("<tr",0,m.start()):html.find("</tr>",m.start())]
              return None
          def icons(row):
              return (row.count("air_good"), row.count("air_bad")) if row else (0, 0)
          # 兩筆 feed 每次載入只有一筆帶即時圖示,且「停車場」feed 較新鮮:
          # 重試直到抓到停車場那筆有圖示,備援才用「玉成國小站」(充電站 feed,會滯後數小時)
          live = backup = fee_row = None
          for attempt in range(6):
              if attempt: time.sleep(5)
              html = fetch()
              p, b = row_for(html, PRIMARY), row_for(html, BACKUP)
              if p: fee_row = p
              if sum(icons(p)):
                  live = (PRIMARY, p); break
              if b and sum(icons(b)):
                  backup = (BACKUP, b)
          live = live or backup
          if not live: raise SystemExit("找不到玉成國小即時資料")
          good, bad = icons(live[1])
          fee_row = fee_row or live[1]
          tds = [re.sub(r"<[^>]+>","",c).strip() for c in re.findall(r"<td[^>]*>(.*?)</td>", fee_row, re.S)]
          # 一般汽車/機車車位:台北市停管處 TCMSV 官方 feed (玉成國小 = TPE0722)
          # availablecar 為 -9 時代表該場站無即時資料,由前端顯示「無資料」
          CAR_ID = "TPE0722"
          NEARBY_IDS = ["TPE1259", "TPE1810", "TPE0596", "TPE1780"]  # 新新公園/Times昆陽街/南港高中/國建南港昆陽
          car = {"carTotal":None, "carAvail":None, "motorTotal":None, "motorAvail":None,
                 "hcAvail":None, "pgAvail":None, "hmAvail":None,
                 "nearby":{i:None for i in NEARBY_IDS}}
          def get_json(url):
              req = urllib.request.Request(url, headers={"User-Agent":"Mozilla/5.0"})
              return json.loads(urllib.request.urlopen(req, timeout=40, context=ctx).read().decode("utf-8","ignore"))
          try:
              desc = get_json("https://tcgbusfs.blob.core.windows.net/blobtcmsv/TCMSV_alldesc.json")
              p = next((x for x in desc["data"]["park"] if x.get("id")==CAR_ID), None)
              if p: car["carTotal"], car["motorTotal"] = p.get("totalcar"), p.get("totalmotor")
              avail = get_json("https://tcgbusfs.blob.core.windows.net/blobtcmsv/TCMSV_allavailable.json")
              by_id = {x.get("id"): x for x in avail["data"]["park"]}
              car["nearby"] = {i: (by_id[i].get("availablecar") if i in by_id else None) for i in NEARBY_IDS}
              a = by_id.get(CAR_ID)
              if a:
                  car["carAvail"], car["motorAvail"] = a.get("availablecar"), a.get("availablemotor")
                  car["hcAvail"] = a.get("availablehandicap")
                  car["pgAvail"] = a.get("availablepregnancy")
                  car["hmAvail"] = a.get("availableheavymotor")
          except Exception as e:
              print("TCMSV fetch failed (車位欄位維持 null):", e)
          tz = datetime.timezone(datetime.timedelta(hours=8))
          data = {
            "good":good, "bad":bad, "total":good+bad,
            "live":good+bad>0, "source":live[0],
            "stale_feed":live[0]!=PRIMARY,
            "parkFee":tds[1] if len(tds)>1 else "",
            "chgFee":tds[3] if len(tds)>3 else "",
            **car,
            "updated":datetime.datetime.now(tz).strftime("%Y-%m-%d %H:%M:%S"),
          }
          open("status.json","w",encoding="utf-8").write(json.dumps(data,ensure_ascii=False))
          print(data)
          PY
      - name: 提交更新
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add status.json
          git diff --staged --quiet || (git commit -m "update status" && git push)
